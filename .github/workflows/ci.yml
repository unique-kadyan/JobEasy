name: CI — Build & Test

# Versions are derived from project definition files — do NOT hardcode here:
#   Java  →  .java-version          (project root)
#   Maven →  backend/.mvn/wrapper/maven-wrapper.properties  (via ./mvnw)
#   Node  →  frontend/.nvmrc

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ── Backend ─────────────────────────────────────────────────────────────────
  backend:
    name: Backend (Java / Maven)
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      # JDK version read from .java-version at the repository root.
      # Maven version pinned in backend/.mvn/wrapper/maven-wrapper.properties.
      - name: Set up JDK (version from .java-version)
        uses: actions/setup-java@v4
        with:
          java-version-file: .java-version
          distribution: temurin
          cache: maven

      - name: Build & test
        working-directory: backend
        run: ./mvnw --batch-mode verify
        env:
          MONGODB_URI: mongodb://localhost:27017/kaddy_test
          # JWT_SECRET is intentionally omitted here.
          # application-test.yml supplies a CI-safe fallback via Spring's
          # ${JWT_SECRET:...} placeholder when the variable is not set.

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: backend/target/surefire-reports/

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/target/site/jacoco/

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (Node / Next.js)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Node version read from frontend/.nvmrc.
      # npm version is managed by the Node.js release (package.json engines field
      # documents the minimum requirement).
      - name: Set up Node.js (version from frontend/.nvmrc)
        uses: actions/setup-node@v4
        with:
          node-version-file: frontend/.nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080
