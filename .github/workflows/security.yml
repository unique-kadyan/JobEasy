name: Security — Dependency & Secret Scan

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    # Runs every Sunday at 06:00 UTC
    - cron: '0 6 * * 0'

jobs:
  # ── OWASP Dependency Check (Java) ─────────────────────────────────────────
  owasp-backend:
    name: OWASP Dependency Check — Backend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run OWASP Dependency Check
        working-directory: backend
        run: |
          mvn --batch-mode org.owasp:dependency-check-maven:check \
            -DfailBuildOnCVSS=7 \
            -Dformats=HTML,SARIF \
            -DsuppressionsFile=.owasp-suppressions.xml 2>/dev/null || true
        continue-on-error: true

      - name: Upload OWASP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-report
          path: backend/target/dependency-check-report.html

      - name: Upload SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: backend/target/dependency-check-report.sarif
        continue-on-error: true

  # ── npm Audit (Frontend) ──────────────────────────────────────────────────
  npm-audit:
    name: npm Audit — Frontend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run npm audit (high & critical)
        working-directory: frontend
        run: npm audit --audit-level=high
        continue-on-error: true

  # ── Secret Scanning with Trivy ────────────────────────────────────────────
  secret-scan:
    name: Secret Scan — Trivy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Trivy secret scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          scanners: secret
          severity: HIGH,CRITICAL
          format: sarif
          output: trivy-secrets.sarif
        continue-on-error: true

      - name: Upload Trivy results to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-secrets.sarif
        continue-on-error: true

  # ── Dependency Review (PRs only) ──────────────────────────────────────────
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: always
