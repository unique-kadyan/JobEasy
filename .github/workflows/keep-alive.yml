name: Keep Render Instances Alive

# HOW THIS ACHIEVES ~1-MINUTE EFFECTIVE FREQUENCY
#
# GitHub enforces a minimum of 5 minutes per individual cron schedule.
# This workflow uses 5 entries, each running every 5 minutes but offset
# by 1 minute from each other:
#
#   Entry 1:  :00, :05, :10, :15, :20, :25, :30, :35, :40, :45, :50, :55
#   Entry 2:  :01, :06, :11, :16, :21, :26, :31, :36, :41, :46, :51, :56
#   Entry 3:  :02, :07, :12, :17, :22, :27, :32, :37, :42, :47, :52, :57
#   Entry 4:  :03, :08, :13, :18, :23, :28, :33, :38, :43, :48, :53, :58
#   Entry 5:  :04, :09, :14, :19, :24, :29, :34, :39, :44, :49, :54, :59
#
# Together they cover every minute of every hour. Each individual entry
# complies with GitHub's 5-minute minimum.
#
# ROLE IN THE SYSTEM
# This workflow is the cold-start rescue net only. Once either service wakes
# up, its built-in scheduler (SelfPingScheduler / instrumentation.ts) pings
# both services every 20 s — well under Render's 35-second freeze threshold —
# so the services stay alive indefinitely without needing this workflow.
#
# One-time setup:
#   Repo → Settings → Secrets and variables → Actions → New repository secret
#   RENDER_BACKEND_URL  — e.g. https://kaddy-backend.onrender.com
#   RENDER_FRONTEND_URL — e.g. https://kaddy-frontend.onrender.com

on:
  schedule:
    - cron: "0/5 * * * *"   # fires at :00, :05, :10 ...
    - cron: "1/5 * * * *"   # fires at :01, :06, :11 ...
    - cron: "2/5 * * * *"   # fires at :02, :07, :12 ...
    - cron: "3/5 * * * *"   # fires at :03, :08, :13 ...
    - cron: "4/5 * * * *"   # fires at :04, :09, :14 ...
  workflow_dispatch:         # manual trigger for testing

jobs:
  wake:
    name: Wake both Render services
    runs-on: ubuntu-latest
    timeout-minutes: 3

    env:
      BACKEND_URL:  ${{ secrets.RENDER_BACKEND_URL }}
      FRONTEND_URL: ${{ secrets.RENDER_FRONTEND_URL }}

    steps:
      - name: Wake backend
        if: env.BACKEND_URL != ''
        run: |
          URL="$BACKEND_URL/api/ping"
          echo "Waking backend: $URL"
          MAX=90 STEP=5 ELAPSED=0
          while [ $ELAPSED -lt $MAX ]; do
            STATUS=$(curl -s -o /tmp/b.txt -w "%{http_code}" --max-time $STEP "$URL" 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✓ Backend alive after ${ELAPSED}s — $(cat /tmp/b.txt)"
              exit 0
            fi
            echo "  [${ELAPSED}s] status=$STATUS — retrying in ${STEP}s..."
            sleep $STEP
            ELAPSED=$((ELAPSED + STEP))
          done
          echo "⚠ Backend did not respond in ${MAX}s"

      - name: Wake frontend
        if: env.FRONTEND_URL != ''
        run: |
          URL="$FRONTEND_URL/api/ping"
          echo "Waking frontend: $URL"
          MAX=90 STEP=5 ELAPSED=0
          while [ $ELAPSED -lt $MAX ]; do
            STATUS=$(curl -s -o /tmp/f.txt -w "%{http_code}" --max-time $STEP "$URL" 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✓ Frontend alive after ${ELAPSED}s — $(cat /tmp/f.txt)"
              exit 0
            fi
            echo "  [${ELAPSED}s] status=$STATUS — retrying in ${STEP}s..."
            sleep $STEP
            ELAPSED=$((ELAPSED + STEP))
          done
          echo "⚠ Frontend did not respond in ${MAX}s"

      - name: Secrets not configured
        if: env.BACKEND_URL == '' && env.FRONTEND_URL == ''
        run: |
          echo "Add RENDER_BACKEND_URL and RENDER_FRONTEND_URL in:"
          echo "  Repo → Settings → Secrets and variables → Actions"
