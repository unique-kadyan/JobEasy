name: Keep Render Instances Alive

on:
  schedule:
    - cron: "0/5 * * * *"
    - cron: "1/5 * * * *"
    - cron: "2/5 * * * *"
    - cron: "3/5 * * * *"
    - cron: "4/5 * * * *"
  workflow_dispatch:

jobs:
  wake:
    name: Wake both Render services
    runs-on: ubuntu-latest
    timeout-minutes: 3

    env:
      BACKEND_URL:  ${{ secrets.RENDER_BACKEND_URL }}
      FRONTEND_URL: ${{ secrets.RENDER_FRONTEND_URL }}

    steps:
      - name: Wake backend
        if: env.BACKEND_URL != ''
        run: |
          URL="$BACKEND_URL/api/ping"
          echo "Waking backend: $URL"
          MAX=90 STEP=5 ELAPSED=0
          while [ $ELAPSED -lt $MAX ]; do
            STATUS=$(curl -s -o /tmp/b.txt -w "%{http_code}" --max-time $STEP "$URL" 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✓ Backend alive after ${ELAPSED}s — $(cat /tmp/b.txt)"
              exit 0
            fi
            echo "  [${ELAPSED}s] status=$STATUS — retrying in ${STEP}s..."
            sleep $STEP
            ELAPSED=$((ELAPSED + STEP))
          done
          echo "⚠ Backend did not respond in ${MAX}s"

      - name: Wake frontend
        if: env.FRONTEND_URL != ''
        run: |
          URL="$FRONTEND_URL/api/ping"
          echo "Waking frontend: $URL"
          MAX=90 STEP=5 ELAPSED=0
          while [ $ELAPSED -lt $MAX ]; do
            STATUS=$(curl -s -o /tmp/f.txt -w "%{http_code}" --max-time $STEP "$URL" 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✓ Frontend alive after ${ELAPSED}s — $(cat /tmp/f.txt)"
              exit 0
            fi
            echo "  [${ELAPSED}s] status=$STATUS — retrying in ${STEP}s..."
            sleep $STEP
            ELAPSED=$((ELAPSED + STEP))
          done
          echo "⚠ Frontend did not respond in ${MAX}s"

      - name: Secrets not configured
        if: env.BACKEND_URL == '' && env.FRONTEND_URL == ''
        run: |
          echo "Add RENDER_BACKEND_URL and RENDER_FRONTEND_URL in:"
          echo "  Repo → Settings → Secrets and variables → Actions"
