name: CodeQL — Security Analysis

# Versions are derived from project definition files — do NOT hardcode here:
#   Java  →  .java-version          (project root)
#   Maven →  backend/.mvn/wrapper/maven-wrapper.properties  (via ./mvnw)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    # Runs every Monday at 08:00 UTC
    - cron: '0 8 * * 1'

jobs:
  analyze:
    name: CodeQL (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [ java, javascript ]

    steps:
      - uses: actions/checkout@v4

      # JDK version read from .java-version at the repository root.
      # Only needed for the Java analysis leg.
      - name: Set up JDK (version from .java-version)
        if: matrix.language == 'java'
        uses: actions/setup-java@v4
        with:
          java-version-file: .java-version
          distribution: temurin
          cache: maven

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality

      - name: Build backend for CodeQL (Java only)
        if: matrix.language == 'java'
        working-directory: backend
        run: ./mvnw --batch-mode compile -DskipTests
        env:
          MONGODB_URI: mongodb://localhost:27017/kaddy_test
          # JWT_SECRET is intentionally omitted here.
          # application-test.yml supplies a CI-safe fallback via Spring's
          # ${JWT_SECRET:...} placeholder when the variable is not set.

      - name: Autobuild (JavaScript)
        if: matrix.language == 'javascript'
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:${{ matrix.language }}
