name: Code Quality — SpotBugs & PMD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  spotbugs:
    name: SpotBugs — Bug Pattern Detection
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Compile
        working-directory: backend
        run: mvn --batch-mode compile -DskipTests
        env:
          MONGODB_URI: mongodb://localhost:27017/kaddy_test
          JWT_SECRET: test-secret-key-for-analysis-only

      - name: Run SpotBugs
        working-directory: backend
        run: |
          mvn --batch-mode com.github.spotbugs:spotbugs-maven-plugin:spotbugs \
            -Dspotbugs.effort=Max \
            -Dspotbugs.threshold=Medium \
            -Dspotbugs.xmlOutput=true
        continue-on-error: true

      - name: Upload SpotBugs report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spotbugs-report
          path: backend/target/spotbugsXml.xml

  pmd:
    name: PMD — Code Analysis
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run PMD
        working-directory: backend
        run: |
          mvn --batch-mode pmd:check \
            -Dpmd.failOnViolation=false \
            -Dpmd.printFailingErrors=true
        continue-on-error: true

      - name: Upload PMD report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pmd-report
          path: backend/target/pmd.xml
