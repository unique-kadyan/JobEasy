name: Code Quality — SpotBugs & PMD

# Versions are derived from project definition files — do NOT hardcode here:
#   Java  →  .java-version          (project root)
#   Maven →  backend/.mvn/wrapper/maven-wrapper.properties  (via ./mvnw)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  spotbugs:
    name: SpotBugs — Bug Pattern Detection
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v4

      # JDK version read from .java-version at the repository root.
      - name: Set up JDK (version from .java-version)
        uses: actions/setup-java@v4
        with:
          java-version-file: .java-version
          distribution: temurin
          cache: maven

      - name: Compile
        working-directory: backend
        run: ./mvnw --batch-mode compile -DskipTests
        env:
          MONGODB_URI: mongodb://localhost:27017/kaddy_test
          # JWT_SECRET is intentionally omitted here.
          # application-test.yml supplies a CI-safe fallback via Spring's
          # ${JWT_SECRET:...} placeholder when the variable is not set.

      - name: Run SpotBugs
        working-directory: backend
        run: |
          ./mvnw --batch-mode com.github.spotbugs:spotbugs-maven-plugin:spotbugs \
            -Dspotbugs.effort=Max \
            -Dspotbugs.threshold=Medium \
            -Dspotbugs.xmlOutput=true
        continue-on-error: true

      - name: Upload SpotBugs report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spotbugs-report
          path: backend/target/spotbugsXml.xml

  pmd:
    name: PMD — Code Analysis
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # JDK version read from .java-version at the repository root.
      - name: Set up JDK (version from .java-version)
        uses: actions/setup-java@v4
        with:
          java-version-file: .java-version
          distribution: temurin
          cache: maven

      - name: Run PMD
        working-directory: backend
        run: |
          ./mvnw --batch-mode pmd:check \
            -Dpmd.failOnViolation=false \
            -Dpmd.printFailingErrors=true
        continue-on-error: true

      - name: Upload PMD report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pmd-report
          path: backend/target/pmd.xml
