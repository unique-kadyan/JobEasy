# ─────────────────────────────────────────────────────────────────────────────
# Render Blueprint — Kaddy Auto-Apply
#
# Declares all three services so a single "New Blueprint Instance" in the
# Render dashboard provisions the full stack from this file:
#
#   kaddy-redis     — Render managed Redis (Key Value store)
#   kaddy-backend   — Spring Boot 4 / Java 25 (Docker runtime)
#   kaddy-frontend  — Next.js 14 (native Node.js runtime)
#
# Docs: https://render.com/docs/blueprint-spec
#
# Usage:
#   1. Push this file to your GitHub repository.
#   2. Render dashboard → New → Blueprint → connect this repo.
#   3. Render creates all three services and prompts for every env var
#      marked  sync: false  (secrets not stored in this file).
#   4. After first deploy, copy the backend URL and set it as
#      NEXT_PUBLIC_API_URL on the frontend service (append /api).
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Redis — Render managed Key Value store ─────────────────────────────────
  #
  # Render provisions and manages this Redis instance automatically.
  # No external Redis Cloud account or manual credentials needed.
  #
  # Persistence:
  #   Render's free-tier Redis does NOT persist data across restarts.
  #   Upgrade to the Starter plan ($7/month) to enable AOF persistence.
  #   For local development, Docker Redis (docker-compose.yml) still runs
  #   with full AOF + RDB persistence via redis/redis.conf.
  #
  # The backend receives the full connection string automatically via the
  # REDIS_URL env var (fromService reference below) — no manual copy-paste.
  # ───────────────────────────────────────────────────────────────────────────
  - type: redis
    name: kaddy-redis
    region: oregon
    plan: free              # upgrade to starter for AOF persistence
    maxmemoryPolicy: allkeys-lru   # matches redis.conf — evict LRU keys on memory pressure
    ipAllowList: []         # empty = accessible only from services in this Render account

  # ── Backend — Spring Boot 4 (Java 25 via Docker) ──────────────────────────
  #
  # Docker runtime is required because Render's native Java runtime supports
  # up to Java 21.  The Dockerfile at backend/Dockerfile uses the official
  # Eclipse Temurin 25 image and produces a minimal JRE-only runtime image.
  # ───────────────────────────────────────────────────────────────────────────
  - type: web
    name: kaddy-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    region: oregon
    plan: free              # upgrade to starter+ for always-on (free tier sleeps after 15 min)

    # Health check — Spring Boot Actuator; Render polls this to determine
    # liveness and routes traffic only after the service is healthy.
    healthCheckPath: /actuator/health

    envVars:
      # ── Database ────────────────────────────────────────────────────────────
      - key: MONGODB_URI
        sync: false         # paste your MongoDB Atlas URI in the Render dashboard
                            # format: mongodb+srv://user:pass@cluster.mongodb.net/autoapply?appName=...

      # ── Redis ───────────────────────────────────────────────────────────────
      # REDIS_URL is injected automatically from the kaddy-redis service above.
      # RedisConfig.java reads it directly via @Value("${REDIS_URL:}") and
      # parses host/port/password from the connection string.
      # No REDIS_HOST / REDIS_PORT / REDIS_PASSWORD entries are needed.
      - key: REDIS_URL
        fromService:
          type: redis
          name: kaddy-redis
          property: connectionString   # format: redis://:password@host:port

      # ── JWT ─────────────────────────────────────────────────────────────────
      - key: JWT_SECRET
        generateValue: true   # Render auto-generates a cryptographically secure random value

      # ── CORS & Frontend URL ─────────────────────────────────────────────────
      # Set these after the frontend service URL is known.
      - key: CORS_ORIGINS
        sync: false         # e.g. https://kaddy-frontend.onrender.com
      - key: FRONTEND_URL
        sync: false         # same value as CORS_ORIGINS (used in email reset links)

      # ── Email ───────────────────────────────────────────────────────────────
      - key: RESEND_API_KEY
        sync: false
      - key: BREVO_API_KEY
        sync: false
      - key: MAIL_FROM
        sync: false         # e.g. noreply@yourdomain.com

      # ── AI Providers ────────────────────────────────────────────────────────
      - key: AI_DEFAULT_PROVIDER
        value: OPENAI       # change to GROQ / CLAUDE / GEMINI etc. as preferred
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY      # Claude — app reads ${ANTHROPIC_API_KEY:}
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: MISTRAL_API_KEY
        sync: false
      - key: CEREBRAS_API_KEY
        sync: false
      - key: TOGETHER_API_KEY
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: HYPERBOLIC_API_KEY
        sync: false
      - key: SAMBANOVA_API_KEY
        sync: false
      - key: NOVITA_API_KEY
        sync: false

      # ── Job Scrapers ────────────────────────────────────────────────────────
      - key: JSEARCH_API_KEY
        sync: false
      - key: SERPAPI_API_KEY        # app reads ${SERPAPI_API_KEY:}
        sync: false
      - key: ADZUNA_APP_ID
        sync: false
      - key: ADZUNA_APP_KEY
        sync: false
      - key: CAREERJET_AFFILIATE_ID
        sync: false

      # ── Payments ────────────────────────────────────────────────────────────
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false

      # ── Runtime tuning ──────────────────────────────────────────────────────
      # PORT is injected automatically by Render — no manual entry needed.
      # The Dockerfile ENTRYPOINT reads ${PORT:-8080} at container start.
      - key: SPRING_PROFILES_ACTIVE
        value: prod           # activates application-prod.yml (sets spring.data.redis.url)
      - key: SPRING_THREADS_VIRTUAL_ENABLED
        value: "true"
      - key: UPLOAD_DIR
        value: /tmp/uploads  # ephemeral on free tier — use S3/R2 for production

  # ── Frontend — Next.js 14 (native Node.js runtime) ─────────────────────────
  #
  # Node version is read from frontend/.nvmrc (currently 20).
  # Render's native Node runtime is sufficient; no Dockerfile required.
  # ───────────────────────────────────────────────────────────────────────────
  - type: web
    name: kaddy-frontend
    runtime: node
    region: oregon
    plan: free
    rootDir: frontend
    buildCommand: npm ci && npm run build
    startCommand: npm start

    envVars:
      # Set this to the backend service URL after the first deploy.
      # Format: https://<kaddy-backend>.onrender.com/api
      - key: NEXT_PUBLIC_API_URL
        sync: false
