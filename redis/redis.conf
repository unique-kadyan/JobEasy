# ─────────────────────────────────────────────────────────────────────────────
# Redis configuration for Kaddy Auto-Apply
#
# Persistence strategy: dual-layer
#   1. AOF  (appendonly) — logs every write command; survives any crash or
#      clean shutdown. fsync every second balances safety vs throughput.
#   2. RDB  (save)       — periodic binary snapshot as a fast-restore backup.
#      Used for disaster recovery, not as the primary durability mechanism.
#
# Result: on restart Redis replays the AOF, so no data loss beyond at most
# 1 second of writes (the fsync interval). The RDB snapshot provides a
# point-in-time backup that can restore much faster than a full AOF replay
# on very large datasets.
# ─────────────────────────────────────────────────────────────────────────────

# ── Network ──────────────────────────────────────────────────────────────────
bind 0.0.0.0
port 6379
tcp-backlog 511
timeout 0
tcp-keepalive 300

# ── Authentication ────────────────────────────────────────────────────────────
# Set via REDIS_PASSWORD env var in docker-compose requirepass directive.
# Left blank here — overridden by the compose `command` flag.

# ── Memory ───────────────────────────────────────────────────────────────────
# Cap heap usage; evict least-recently-used cache keys when limit is reached.
# Adjust maxmemory to the available RAM on your server.
maxmemory 512mb
# allkeys-lru: evict any key (not just those with TTL) using LRU — optimal
# for a mixed cache + session store where all keys should be eligible.
maxmemory-policy allkeys-lru

# ── RDB snapshots (secondary backup) ─────────────────────────────────────────
# save <seconds> <changes>  — snapshot if N changes occurred in T seconds
save 3600 1        # at least 1 change in the last hour
save 300  100      # at least 100 changes in the last 5 minutes
save 60   10000    # at least 10 000 changes in the last minute

dbfilename dump.rdb
dir /data

# ── AOF — primary persistence ─────────────────────────────────────────────────
appendonly yes
appendfilename "appendonly.aof"

# everysec: flush AOF buffer to disk once per second.
# Trade-off: at most 1 second of data loss on hard crash; near-zero CPU cost.
# (always = zero loss but much higher I/O; no = fastest but unsafe)
appendfsync everysec

# Don't pause AOF fsync during RDB rewrite — keeps latency predictable.
no-appendfsync-on-rewrite no

# Trigger AOF rewrite when the file grows 100 % larger than the last rewrite
# baseline, but only if it is at least 64 MB.
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# Load a truncated AOF on startup rather than failing — tolerates a partial
# write caused by an unclean shutdown at the very end of the file.
aof-use-rdb-preamble yes

# ── Logging ───────────────────────────────────────────────────────────────────
loglevel notice
logfile ""

# ── Performance ───────────────────────────────────────────────────────────────
# Disable Transparent Huge Pages latency spikes warning suppression
# (the actual THP setting must be done at the host OS level).
activerehashing yes
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes
lazyfree-lazy-user-del yes

# ── Slow log ─────────────────────────────────────────────────────────────────
slowlog-log-slower-than 10000
slowlog-max-len 128
