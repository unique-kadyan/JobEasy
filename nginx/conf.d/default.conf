# ─────────────────────────────────────────────────────────────────────────────
# Nginx upstream + rate limiting + server block for Kaddy Auto-Apply
#
# Rate limit zones (shared memory, survives worker restarts):
#
#   auth_zone    — 5 req/min per IP on auth endpoints (brute-force prevention)
#   upload_zone  — 10 req/min per IP on file upload endpoint
#   api_zone     — 120 req/min per IP on all other API calls
#   global_zone  — 300 req/min per IP across the whole server (safety net)
# ─────────────────────────────────────────────────────────────────────────────

# ── Rate limiting zones ───────────────────────────────────────────────────────
limit_req_zone  $binary_remote_addr  zone=auth_zone:10m    rate=5r/m;
limit_req_zone  $binary_remote_addr  zone=upload_zone:10m  rate=10r/m;
limit_req_zone  $binary_remote_addr  zone=api_zone:10m     rate=120r/m;
limit_req_zone  $binary_remote_addr  zone=global_zone:20m  rate=300r/m;

limit_req_status  429;   # return 429 (not 503) when rate limit hit
limit_conn_zone   $binary_remote_addr  zone=conn_zone:10m;

# ── Upstream: Spring Boot backend instances ───────────────────────────────────
# Docker Compose service name "api" resolves to ALL running replicas via
# Docker's internal DNS round-robin. When you run:
#   docker compose -f docker-compose.yml -f docker-compose.lb.yml up --scale api=3
# Docker creates 3 containers each registered under the "api" name.
# The resolver directive tells nginx to re-resolve this name every 10 s so
# it picks up new containers when you scale up/down without reloading nginx.
# ─────────────────────────────────────────────────────────────────────────────
upstream api_backend {
    least_conn;                             # route to the instance with fewest active connections
    server api:8080 max_fails=3 fail_timeout=30s;
    keepalive 32;                           # persistent connections to upstream — reduces latency
}

# ── Main server block ─────────────────────────────────────────────────────────
server {
    listen 80;
    server_name _;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"            always;
    add_header X-Content-Type-Options    "nosniff"               always;
    add_header X-XSS-Protection          "1; mode=block"         always;
    add_header Referrer-Policy           "strict-origin"         always;
    add_header Permissions-Policy        "camera=(), microphone=()" always;

    # ── Global connection limit ───────────────────────────────────────────────
    limit_conn  conn_zone  20;              # max 20 simultaneous connections per IP
    limit_req   zone=global_zone  burst=50  nodelay;

    # ── Health check (no auth, no rate limit) ─────────────────────────────────
    location = /health {
        proxy_pass  http://api_backend/actuator/health;
        access_log  off;
        proxy_read_timeout 5s;
    }

    # ── Auth endpoints — strictest rate limiting ──────────────────────────────
    location ~ ^/api/auth/(login|signup|forgot-password|reset-password)$ {
        limit_req  zone=auth_zone  burst=5  nodelay;
        proxy_pass http://api_backend;
    }

    # ── File upload endpoint ──────────────────────────────────────────────────
    location = /api/resumes/upload {
        limit_req           zone=upload_zone  burst=5  nodelay;
        client_max_body_size 11m;
        proxy_read_timeout  60s;           # parsing a large PDF can take time
        proxy_pass          http://api_backend;
    }

    # ── AI endpoints — relaxed timeout for long LLM calls ─────────────────────
    location ~ ^/api/(jobs/[^/]+/summarize|cover-letters/generate|resumes/optimize) {
        limit_req           zone=api_zone  burst=10  nodelay;
        proxy_read_timeout  90s;           # AI calls can take up to 30-60 s
        proxy_send_timeout  90s;
        proxy_pass          http://api_backend;
    }

    # ── All other API endpoints ───────────────────────────────────────────────
    location /api/ {
        limit_req  zone=api_zone  burst=30  nodelay;
        proxy_pass http://api_backend;
    }

    # ── Block access to anything else (only /api/** is valid) ─────────────────
    location / {
        return 404;
    }

    # ── Custom error pages ────────────────────────────────────────────────────
    error_page 429 /429.json;
    location = /429.json {
        internal;
        default_type application/json;
        return 429 '{"status":429,"message":"Too many requests. Please slow down."}';
    }

    error_page 502 503 504 /5xx.json;
    location = /5xx.json {
        internal;
        default_type application/json;
        return 503 '{"status":503,"message":"Service temporarily unavailable. Please try again."}';
    }
}
