# ─────────────────────────────────────────────────────────────────────────────
# Nginx main configuration — Kaddy Auto-Apply load balancer
#
# Tuning philosophy:
#   - worker_processes auto  →  one worker per CPU core (OS scheduler handles them)
#   - worker_connections     →  max concurrent connections per worker process
#   - Total capacity         =  worker_processes × worker_connections
# ─────────────────────────────────────────────────────────────────────────────

worker_processes auto;

# Allow each worker to open many files (sockets + static files)
worker_rlimit_nofile 65535;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 4096;

    # epoll is the most efficient I/O event model on Linux
    use epoll;

    # Accept as many connections as possible on a single wake-up
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ──────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time urt=$upstream_response_time';

    access_log /var/log/nginx/access.log main;

    # ── Performance ──────────────────────────────────────────────────────────
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;
    keepalive_requests  1000;
    types_hash_max_size 2048;
    server_tokens       off;   # hide nginx version from error pages

    # ── Gzip compression ─────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_min_length   1000;
    gzip_types
        text/plain text/css text/xml application/json
        application/javascript application/xml+rss
        application/atom+xml image/svg+xml;

    # ── Buffer sizes ─────────────────────────────────────────────────────────
    client_body_buffer_size  128k;
    client_max_body_size     11m;   # must exceed Spring's 10 MB upload limit
    client_header_buffer_size 1k;
    large_client_header_buffers 4 16k;

    # ── Proxy global defaults ─────────────────────────────────────────────────
    proxy_http_version      1.1;
    proxy_set_header        Host              $host;
    proxy_set_header        X-Real-IP         $remote_addr;
    proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header        X-Forwarded-Proto $scheme;
    proxy_set_header        Connection        "";    # enable keepalive to upstream
    proxy_connect_timeout   5s;
    proxy_send_timeout      60s;
    proxy_read_timeout      60s;    # generous — AI endpoints can take ~30s
    proxy_buffering         on;
    proxy_buffer_size       4k;
    proxy_buffers           8 32k;

    # ── Include server blocks ─────────────────────────────────────────────────
    include /etc/nginx/conf.d/*.conf;
}
