spring:
  threads:
    virtual:
      enabled: false    # avoids redisConnectionFactoryVirtualThreads which fails on empty REDIS_URL
  data:
    mongodb:
      # MONGODB_URI must be set as an environment variable.
      # CI:        set automatically by the ci.yml workflow (local Docker service, no credentials).
      # Local dev: export MONGODB_URI=mongodb://localhost:27017/autoapply  (or your Atlas URI).
      # No default credentials are stored here — never commit real connection strings.
      uri: ${MONGODB_URI:mongodb://localhost:27017/autoapply}
    redis:
      url: "redis://${REDIS_HOST:localhost}:${REDIS_PORT:6379}"
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      connect-timeout: 2s
      timeout: 2s
  mail:
    host: localhost
    port: 2525

app:
  jwt:
    secret: ${JWT_SECRET:test-secret-key-that-is-at-least-256-bits-long-for-hmac-sha256-signing-algorithm-here}
    access-token-expiry: 900000
    refresh-token-expiry: 604800000
  email:
    resend:
      api-key: ""
    brevo:
      api-key: ""
  ai:
    cerebras:
      api-key: ""
    groq:
      api-key: ""
    together:
      api-key: ""
    mistral:
      api-key: ""
    sambanova:
      api-key: ""
    novita:
      api-key: ""
    gemini:
      api-key: ""
    claude:
      api-key: ""
      model: claude-sonnet-4-20250514
    openai:
      api-key: ""
      model: gpt-4o
    default-provider: OPENAI
  scraper:
    jsearch-api-key: ""
    cache-ttl-minutes: 1
    adzuna:
      app-id: ""
      app-key: ""
    serpapi:
      api-key: ""
    careerjet:
      affiliate-id: ""
  cors:
    allowed-origins: http://localhost:3000
  upload:
    dir: ./test-uploads
  mail:
    from: test@kaddy.app
  frontend-url: http://localhost:3000

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

resilience4j:
  circuitbreaker:
    instances:
      claudeAi:
        sliding-window-size: 2
        failure-rate-threshold: 50
        wait-duration-in-open-state: 5s
      openAi:
        sliding-window-size: 2
        failure-rate-threshold: 50
        wait-duration-in-open-state: 5s
  retry:
    instances:
      claudeAi:
        max-attempts: 1
      openAi:
        max-attempts: 1
