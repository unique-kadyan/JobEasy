server:
  port: 8080
  tomcat:
    threads:
      max: 200
      min-spare: 10
    accept-count: 500
    max-connections: 20000
    connection-timeout: 5000ms

spring:
  threads:
    virtual:
      enabled: true



  mongodb:
    uri: ${MONGODB_URI}

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      connect-timeout: 1000ms
      lettuce:
        pool:
          max-active: 50
          max-idle: 20
          min-idle: 5
          max-wait: 1000ms
        shutdown-timeout: 200ms

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

app:
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiry: 3600000
    refresh-token-expiry: 604800000

  email:
    resend:
      api-key: ${RESEND_API_KEY:}
      from: ${RESEND_FROM:Auto Apply <jobbotnoreply@gmail.com>}
    brevo:
      api-key: ${BREVO_API_KEY:}
      from: ${BREVO_FROM:jobbotnoreply@gmail.com}

  ai:
    provider-order:
      free: DEEPSEEK,TOGETHER_DEEPSEEK_V3,HYPERBOLIC,CEREBRAS_QWEN,GROQ,CEREBRAS,TOGETHER,MISTRAL,SAMBANOVA,NOVITA
      premium: GEMINI,OPENAI,CLAUDE
    cerebras:
      api-key: ${CEREBRAS_API_KEY:}
      model: llama-3.3-70b
    groq:
      api-key: ${GROQ_API_KEY:}
      model: llama-3.3-70b-versatile
    together:
      api-key: ${TOGETHER_API_KEY:}
      model: meta-llama/Llama-3.3-70B-Instruct-Turbo
    mistral:
      api-key: ${MISTRAL_API_KEY:}
      model: mistral-small-latest
    sambanova:
      api-key: ${SAMBANOVA_API_KEY:}
      model: Meta-Llama-3.3-70B-Instruct
    novita:
      api-key: ${NOVITA_API_KEY:}
      model: meta-llama/llama-3.3-70b-instruct
    deepseek:
      api-key: ${DEEPSEEK_API_KEY:}
      model: deepseek-chat
    hyperbolic:
      api-key: ${HYPERBOLIC_API_KEY:}
      model: meta-llama/Llama-3.3-70B-Instruct
    gemini:
      api-key: ${GEMINI_API_KEY:}
      model: gemini-2.0-flash
    openai:
      api-key: ${OPENAI_API_KEY:}
      model: gpt-4o
    claude:
      api-key: ${ANTHROPIC_API_KEY:}
      model: claude-sonnet-4-20250514

  scraper:
    cache-ttl-minutes: 60
    jsearch-api-key: ${JSEARCH_API_KEY:}
    adzuna:
      app-id: ${ADZUNA_APP_ID:}
      app-key: ${ADZUNA_APP_KEY:}
      country: ${ADZUNA_COUNTRY:in}
    serpapi:
      api-key: ${SERPAPI_API_KEY:}
    careerjet:
      affiliate-id: ${CAREERJET_AFFILIATE_ID:}
      locale: ${CAREERJET_LOCALE:en_IN}
    reed:
      api-key: ${REED_API_KEY:}
    jooble:
      api-key: ${JOOBLE_API_KEY:}
    usajobs:
      api-key: ${USAJOBS_API_KEY:}
      user-agent: ${USAJOBS_USER_AGENT:kaddy@example.com}

  payment:
    razorpay:
      key-id: ${RAZORPAY_KEY_ID:}
      key-secret: ${RAZORPAY_KEY_SECRET:}

  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000,http://localhost:3001,http://localhost:3002}
  upload:
    dir: ${UPLOAD_DIR:./uploads}
  frontend-url: ${FRONTEND_URL:http://localhost:3000}

  mongodb:
    pool:
      max-size: ${MONGO_POOL_MAX:100}
      min-size: ${MONGO_POOL_MIN:10}
      max-wait-ms: 5000
      max-idle-ms: 60000
    socket:
      connect-timeout-ms: 5000
      read-timeout-ms: 10000
    cluster:
      server-selection-timeout-ms: 5000

  webclient:
    connect-timeout-ms: 5000
    read-timeout-s: 12
    write-timeout-s: 5
    response-timeout-s: 13
    max-connections: 500

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    tags:
      application: kaddy-autoapply

resilience4j:
  circuitbreaker:
    configs:
      freeAiDefault:
        sliding-window-size: 5
        failure-rate-threshold: 60
        wait-duration-in-open-state: 20s
        permitted-number-of-calls-in-half-open-state: 2
      premiumAiDefault:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
    instances:
      cerebrasAi:
        base-config: freeAiDefault
      groqAi:
        base-config: freeAiDefault
      togetherAi:
        base-config: freeAiDefault
      mistralAi:
        base-config: freeAiDefault
      sambanovaAi:
        base-config: freeAiDefault
      novitaAi:
        base-config: freeAiDefault
      geminiAi:
        base-config: premiumAiDefault
      openAi:
        base-config: premiumAiDefault
      claudeAi:
        base-config: premiumAiDefault
      deepseekAi:
        base-config: freeAiDefault
      hyperbolicAi:
        base-config: freeAiDefault
      jobScraper:
        sliding-window-size: 5
        failure-rate-threshold: 60
        wait-duration-in-open-state: 60s
  retry:
    configs:
      freeAiDefault:
        max-attempts: 2
        wait-duration: 500ms
      premiumAiDefault:
        max-attempts: 2
        wait-duration: 1s
    instances:
      freeAi:
        base-config: freeAiDefault
      premiumAi:
        base-config: premiumAiDefault
      claudeAi:
        base-config: premiumAiDefault
      openAi:
        base-config: premiumAiDefault

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    "[com.kaddy.autoapply]": DEBUG
    "[org.springframework.security]": WARN
    "[io.github.resilience4j]": INFO
