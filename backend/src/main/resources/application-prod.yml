server:
  port: ${PORT:8080}
  address: 0.0.0.0
  tomcat:
    threads:
      max: 20
      min-spare: 2
    max-connections: 200
    accept-count: 50
    connection-timeout: 10000ms

spring:

  mongodb:
    uri: ${MONGODB_URI}

  data:
    redis:
      timeout: 2000ms
      connect-timeout: 2000ms
      lettuce:
        pool:
          max-active: 10
          max-idle: 3
          min-idle: 0
          max-wait: 2000ms
    mongodb:
      auto-index-creation: false   # Skip per-collection index verification against Atlas on startup

  mvc:
    servlet:
      load-on-startup: 1   # Eager DispatcherServlet init — avoids 100ms first-request lag after Tomcat binds port

  jmx:
    enabled: false

app:
  mongodb:
    pool:
      max-size: 10
      min-size: 2
  webclient:
    max-connections: 50

management:
  health:
    mongodb:
      enabled: false   # Atlas blocks hello:1 on the `local` system DB → always reports DOWN
    redis:
      enabled: false   # Redis health check was taking 24+ s → blocks /actuator/health response

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

logging:
  level:
    "[com.kaddy.autoapply]": INFO
