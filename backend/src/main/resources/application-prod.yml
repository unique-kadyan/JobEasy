server:
  port: ${PORT:8080}
  address: 0.0.0.0
  tomcat:
    threads:
      max: 20
      min-spare: 2
    max-connections: 200
    accept-count: 50
    connection-timeout: 10000ms

spring:
  data:
    redis:
      timeout: 200ms
      connect-timeout: 200ms
      lettuce:
        pool:
          max-active: 10
          max-idle: 3
          min-idle: 0
          max-wait: 200ms

  jmx:
    enabled: false

app:
  mongodb:
    pool:
      max-size: 10
      min-size: 2
  webclient:
    max-connections: 50

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

logging:
  level:
    "[com.kaddy.autoapply]": INFO
